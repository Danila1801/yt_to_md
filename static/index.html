<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>yt → md 🌿</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌿</text></svg>">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
  <h1><span class="leaf">🌿</span> yt <span class="arrow">→</span> md</h1>
  <p class="tagline">Turn YouTube videos into clean Markdown transcripts for Claude</p>
</header>

<main>
  <section class="input-card">
    <label for="urls">Paste YouTube video or playlist URLs — one per line</label>
    <textarea id="urls" rows="4" placeholder="https://www.youtube.com/watch?v=...&#10;https://youtu.be/...&#10;https://www.youtube.com/playlist?list=..."></textarea>
    <div class="input-row">
      <button id="convertBtn" class="btn primary">Convert 🐾</button>
      <button id="zipBtn" class="btn ghost" disabled>Download all (.zip)</button>
      <span id="globalStatus" class="global-status"></span>
    </div>
    <div id="expandErrors" class="expand-errors hidden"></div>
  </section>

  <section id="workspace" class="workspace hidden">
    <div class="video-list" id="videoList"></div>
    <div class="preview-pane">
      <div class="preview-header">
        <span id="previewTitle" class="preview-title">Preview</span>
        <div class="preview-actions">
          <button id="copyBtn" class="btn small" disabled>Copy</button>
          <button id="downloadBtn" class="btn small" disabled>Download .md</button>
        </div>
      </div>
      <pre id="preview" class="preview-body">Converted markdown will appear here…</pre>
    </div>
  </section>

  <p class="output-hint">Files are also saved automatically to the <code>output/</code> folder next to the app.</p>
</main>
